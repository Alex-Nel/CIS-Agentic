<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>Code Debate</title>
    <link rel="stylesheet" href="./styles.css"/>
  </head>
  <body>
    <div class="container">
      <h1>Multi-Agent Code Debate</h1>

      <div class="row">
        <label>Language</label>
        <input id="language" value="python" placeholder="python, javascript, java, go, rust..." />
      </div>

      <div class="row">
        <label>Rounds (1-3)</label>
        <input id="rounds" type="number" value="2" min="1" max="3"/>
      </div>

      <div class="row">
        <label>Task / Code / Description</label>
        <textarea id="task" rows="8" placeholder="Paste code or describe what you want..."></textarea>
      </div>

      <button id="run" type="button">Run Debate (Stream)</button>
      <div id="run-status" class="run-status" role="status" aria-live="polite" hidden></div>

      <h2>Debate Log</h2>
      <pre id="log"></pre>

      <h2>Final Decision</h2>
      <div id="final"></div>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
